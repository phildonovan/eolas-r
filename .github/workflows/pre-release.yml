name: Pre-release gate

on:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::sf
          needs: check

      - name: Client contract matrix
        run: Rscript scripts/check_client_contract.R

      - name: R CMD check
        run: |
          R CMD build --no-manual .
          R CMD check --no-manual --as-cran eolas_*.tar.gz

      - name: Install + test installed package
        run: |
          R CMD INSTALL .
          Rscript -e 'testthat::test_local(installation = TRUE, stop_on_failure = TRUE)'

      - name: Live smoke
        env:
          EOLAS_API_KEY: ${{ secrets.EOLAS_API_KEY }}
        run: |
          if [ -z "$EOLAS_API_KEY" ]; then
            echo "::error::EOLAS_API_KEY secret required for pre-release smoke."
            exit 1
          fi
          Rscript tests/smoke-live.R

      - name: Version parity with eolas-data
        run: |
          set -euo pipefail
          r_ver=$(awk -F': ' '/^Version:/{print $2; exit}' DESCRIPTION)
          py_ver=$(curl -fsSL "https://raw.githubusercontent.com/phildonovan/eolas-data/master/pyproject.toml" \
            | grep -E '^version = ' | sed 's/version = "\(.*\)"/\1/')
          echo "R: $r_ver | Python (master): $py_ver"
          if [ "$r_ver" != "$py_ver" ]; then
            echo "::warning::Client versions differ — bump both before tagging if shipping related fixes"
          fi