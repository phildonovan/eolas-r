name: R CMD check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - name: Client contract matrix
        run: Rscript scripts/check_client_contract.R

  check:
    needs: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::covr
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'
          upload-snapshots: true

  check-geo:
    needs: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::sf, any::testthat
          needs: check
      - name: Install package
        run: R CMD INSTALL .
      - name: Geo routing + bulk tests
        run: |
          Rscript -e '
            library(eolas)
            testthat::test_file("tests/testthat/test-api.R", package = "eolas", stop_on_failure = TRUE)
            testthat::test_file("tests/testthat/test-bulk.R", package = "eolas", stop_on_failure = TRUE)
            testthat::test_file("tests/testthat/test-progress.R", package = "eolas", stop_on_failure = TRUE)
          '

  install-check:
    needs: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
      - name: Install package (as users would)
        run: R CMD INSTALL .
      - name: Test installed package
        run: Rscript -e 'testthat::test_local(installation = TRUE, stop_on_failure = TRUE)'

  coverage:
    needs: contract
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage
      - name: Test coverage
        run: |
          Rscript -e '
            cov <- covr::package_coverage()
            covr::to_cobertura(cov, file = "cobertura-coverage.xml")
          '
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: cobertura-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false