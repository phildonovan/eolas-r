name: Live API smoke

on:
  schedule:
    - cron: "0 8 * * 1"  # Mondays 08:00 UTC
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: Live smoke script
        env:
          EOLAS_API_KEY: ${{ secrets.EOLAS_API_KEY }}
        run: |
          if [ -z "$EOLAS_API_KEY" ]; then
            echo "EOLAS_API_KEY secret not configured — skipping smoke tests."
            exit 0
          fi
          Rscript -e '
            Sys.setenv(EOLAS_API_KEY = Sys.getenv("EOLAS_API_KEY"))
            library(eolas)
            stopifnot(nrow(eolas_list()) >= 100)
            df <- eolas_get("nz_cpi", limit = 5L)
            stopifnot(nrow(df) >= 1L, "value" %in% names(df))
            meta <- eolas_info("nz_cpi")
            stopifnot(identical(meta$name, "nz_cpi"))
            message("R live smoke: OK")
          '